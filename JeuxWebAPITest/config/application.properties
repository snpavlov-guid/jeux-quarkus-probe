quarkus.datasource.db-kind=h2
quarkus.datasource.reactive.url=h2:mem:jeuxwebapitest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=ORDER;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=sa

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.database.default-schema=football
quarkus.hibernate-orm.packages=Entities
quarkus.hibernate-orm.log.sql=false

quarkus.http.root-path=/
quarkus.http.test-port=0

quarkus.devservices.enabled=false
quarkus.oidc.auth-server-url=http://keycloak-dev:8082/realms/probe-app
quarkus.oidc.application-type=service
quarkus.oidc.client-id=probe-app-client

quarkus.index-dependency.jeuxwebapi.group-id=com.jeuxdbcontext
quarkus.index-dependency.jeuxwebapi.artifact-id=jeuxwebapi
quarkus.index-dependency.jeuxdbcontext.group-id=com.jeuxdbcontext
quarkus.index-dependency.jeuxdbcontext.artifact-id=jeuxdbcontext
RFLeagueId=1

# Keycloak test token config
keycloak.auth.token-url=http://keycloak-dev:8082/realms/probe-app/protocol/openid-connect/token
keycloak.auth.client-id=probe-app-client
keycloak.auth.grant-type=password
keycloak.auth.username=testuser01
keycloak.auth.password=Test-user123
